<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta Information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse the Brew Haven Cafe gallery featuring coffee, food, and cozy cafe ambience.">
    <meta name="keywords" content="Cafe Gallery, Coffee Photos, Food Gallery">
    <meta name="author" content="College Internship Project">

    <!-- Website Title -->
    <title>Brew Haven Cafe | Gallery</title>

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico">

    <!-- Main Stylesheet -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css?v=premium">
</head>

<body>

    <!-- =========================
         Header
    ========================== -->
    <header class="site-header">

        <div class="container">

            <nav class="navbar" aria-label="Main Navigation">

                <a class="logo"
                   href="index.html"
                   aria-label="Brew Haven Cafe Home">
                    Brew Haven Cafe
                </a>

                <button class="nav-toggle"
                        type="button"
                        aria-label="Open menu"
                        aria-controls="primary-navigation"
                        aria-expanded="false">
                    <span class="nav-toggle-line"></span>
                    <span class="nav-toggle-line"></span>
                    <span class="nav-toggle-line"></span>
                </button>

                <ul class="nav-list" id="primary-navigation">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menu</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html" aria-current="page">Gallery</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>

                </ul>

            </nav>

        </div>

    </header>

    <!-- =========================
         Main Content
    ========================== -->
    <main>

        <!-- Gallery Hero -->
        <section class="gallery-hero">

            <div class="container">

                <h1 class="section-title">
                    Our Gallery
                </h1>

                <p class="section-description">
                    Explore our coffee, delicious dishes and cozy cafe atmosphere.
                </p>

            </div>

        </section>

        <!-- Gallery Grid -->
        <section class="gallery-section">

            <div class="container">

                <h2 class="section-title">
                    Gallery Collection
                </h2>

                <div class="gallery-grid">

                    <figure class="card gallery-item">
                        <img
                            src="assets/images/gallery/coffee-01.jpeg"
                            alt="Freshly brewed coffee served in a cup"
                            width="736"
                            height="981"
                            loading="lazy">
                        <figcaption class="gallery-caption">
                            Fresh Coffee
                        </figcaption>
                    </figure>

                    <figure class="card gallery-item">
                        <img
                            src="assets/images/gallery/cappuccino.jpeg"
                            alt="Hot cappuccino with milk foam"
                            width="736"
                            height="1104"
                            loading="lazy">
                        <figcaption class="gallery-caption">
                            Cappuccino
                        </figcaption>
                    </figure>

                    <figure class="card gallery-item">
                        <img
                            src="assets/images/gallery/sandwich.jpeg"
                            alt="Grilled vegetable sandwich"
                            width="735"
                            height="1105"
                            loading="lazy">
                        <figcaption class="gallery-caption">
                            Grilled Sandwich
                        </figcaption>
                    </figure>

                    <figure class="card gallery-item">
                        <img
                            src="assets/images/gallery/cake.jpeg"
                            alt="Chocolate cake served on a plate"
                            width="640"
                            height="640"
                            loading="lazy">
                        <figcaption class="gallery-caption">
                            Chocolate Cake
                        </figcaption>
                    </figure>

                    <figure class="card gallery-item">
                        <img
                            src="assets/images/gallery/interior.jpeg"
                            alt="Cafe interior with cozy seating"
                            width="736"
                            height="1030"
                            loading="lazy">
                        <figcaption class="gallery-caption">
                            Cafe Interior
                        </figcaption>
                    </figure>

                    <figure class="card gallery-item">
                        <img
                            src="assets/images/gallery/outdoor.jpeg"
                            alt="Outdoor seating area of the cafe"
                            width="735"
                            height="1075"
                            loading="lazy">
                        <figcaption class="gallery-caption">
                            Outdoor Seating
                        </figcaption>
                    </figure>

                </div>

            </div>

        </section>

    </main>

    <!-- =========================
         Footer
    ========================== -->
    <footer class="site-footer">

        <div class="container">

            <p>
                &copy; 2026 Brew Haven Cafe. All Rights Reserved.
            </p>

        </div>

    </footer>

    <button class="scroll-to-top" type="button" aria-label="Scroll to top">
        Top
    </button>

    <!-- Main JavaScript -->
    <script src="assets/js/main.js" defer></script>

</body>

</html>
